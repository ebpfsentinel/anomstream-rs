name: Release

# Fires automatically on `v*` tag push (e.g. `v2026.4.1`), or manually
# via `workflow_dispatch` (with optional `force_version` input).
#
# Version logic mirrors ebpfsentinel (calendar versioning YYYY.M.X):
#   - tag push  → version = tag without the `v` prefix
#   - dispatch  → version = `force_version` if given, else auto-bump
#                 patch from latest `vYYYY.M.*` tag for current month
#
# The resolved version is stamped (in-tree, not committed) into:
#   - every workspace Cargo.toml (workspace.package.version + path-dep
#     version specs that currently read `0.0.0-dev`)
#   - README.md (`cargo add` snippets)
#
# Then the release gate runs:
#   1. Full `fmt` + `clippy -D warnings` + workspace tests.
#   2. `cargo audit` clean + `cargo deny check` clean.
#   3. `cargo publish --dry-run` for every publishable member in
#      dependency order (`core → triage → hotpath → anomstream`).
#
# Actual `cargo publish` is still triggered manually by a maintainer
# with `CARGO_REGISTRY_TOKEN` in scope — this workflow gates the
# *readiness* of a tag, not the publication itself.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (optional, format: YYYY.M.X)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          FORCE_VERSION: ${{ github.event.inputs.force_version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "$FORCE_VERSION" ]; then
            VERSION="$FORCE_VERSION"
          else
            git fetch --tags
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            LATEST_TAG=$(git tag -l "v${YEAR}.${MONTH}.*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="${YEAR}.${MONTH}.1"
            else
              PATCH=$(echo "$LATEST_TAG" | sed "s/^v${YEAR}\.${MONTH}\.\([0-9]*\).*/\1/")
              VERSION="${YEAR}.${MONTH}.$((PATCH + 1))"
            fi
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]?\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected YYYY.M.X)"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved version: ${VERSION}"

  gate:
    name: full release gate
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/stamp-version
        with:
          version: ${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --no-default-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --no-default-features --features "anomstream-core/std"
      - run: cargo doc --workspace --all-features --no-deps

  audit:
    name: cargo audit + deny
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/stamp-version
        with:
          version: ${{ needs.prepare.outputs.version }}
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  publish-dry-run:
    name: publish chain --dry-run
    needs: [prepare, gate, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/stamp-version
        with:
          version: ${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Dependency order matters — each member depends on the ones
      # above via a version requirement that must resolve against
      # crates.io (or the in-flight dry-run graph). `--allow-dirty`
      # covers the un-committed Cargo.lock + stamped sources that
      # appear in CI workspaces.
      - run: cargo publish --dry-run -p anomstream-core --allow-dirty
      - run: cargo publish --dry-run -p anomstream-triage --allow-dirty
      - run: cargo publish --dry-run -p anomstream-hotpath --allow-dirty
      - run: cargo publish --dry-run -p anomstream --allow-dirty
