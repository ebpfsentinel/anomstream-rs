name: Stamp Version
description: Replace 0.0.0-dev placeholder in all Cargo.toml files and README.md

inputs:
  version:
    description: "Version string to stamp (e.g. 2026.4.1)"
    required: true

runs:
  using: composite
  steps:
    - name: Stamp version in Cargo.toml + README.md
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]?\.[0-9]+$'; then
          echo "::error::Invalid version format: '$VERSION' (expected YYYY.M.X)"
          exit 1
        fi
        # GNU `sed -i` and BSD `sed -i` (macOS) disagree on the in-place
        # syntax — BSD requires an explicit backup-suffix argument. Use
        # a temp-file rewrite so the action is portable across both
        # ubuntu-latest and macos-latest runners.
        rewrite() {
          local file="$1" pattern="$2"
          sed "$pattern" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
        }
        # Cargo.toml — bump both workspace.package.version and path-dep version specs.
        while IFS= read -r f; do
          rewrite "$f" "s/\"0.0.0-dev\"/\"${VERSION}\"/g"
        done < <(find . -name Cargo.toml -exec grep -l '0.0.0-dev' {} +)
        # README.md — bump documented `cargo add` version snippets.
        if [ -f README.md ]; then
          rewrite README.md "s/0\.0\.0-dev/${VERSION}/g"
        fi
